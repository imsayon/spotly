services:
  # ─── API BACKEND (NestJS) ─────────────────────────────────────────────────
  - type: web
    name: spotly-api
    plan: free
    runtime: node
    buildCommand: pnpm install && pnpm turbo run build --filter=@spotly/api...
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "3001"
      - key: CONSUMER_URL
        value: https://spotly-consumer.onrender.com
      - key: MERCHANT_URL
        value: https://spotly-merchant.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  # ─── CONSUMER FRONTEND (Next.js) ──────────────────────────────────────────
  - type: web
    name: spotly-consumer
    plan: free
    runtime: node
    buildCommand: pnpm install && pnpm turbo run build --filter=@spotly/consumer...
    startCommand: pnpm --filter @spotly/consumer start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        value: https://spotly-api.onrender.com/api
      - key: NEXT_PUBLIC_WS_URL
        value: https://spotly-api.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false

  # ─── MERCHANT FRONTEND (Next.js) ──────────────────────────────────────────
  - type: web
    name: spotly-merchant
    plan: free
    runtime: node
    buildCommand: pnpm install && pnpm turbo run build --filter=@spotly/merchant...
    startCommand: pnpm --filter @spotly/merchant start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        value: https://spotly-api.onrender.com/api
      - key: NEXT_PUBLIC_WS_URL
        value: https://spotly-api.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
