version: "3.8"

services:
    api:
        build:
            context: ../
            dockerfile: infra/Dockerfile.api
        ports:
            - "3001:3001"
        environment:
            - NODE_ENV=production
            - DATABASE_URL=${DATABASE_URL}
            - SUPABASE_URL=${SUPABASE_URL}
            - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
        restart: unless-stopped

    # NOTE: NEXT_PUBLIC_* vars are inlined at BUILD TIME. For production, set real public URLs
    # in .env and pass as build args in dockerfile, or build locally and copy artifacts.
    merchant:
        build:
            context: ../
            dockerfile: infra/Dockerfile.merchant
        ports:
            - "3000:3000"
        environment:
            - NODE_ENV=production
            - NEXT_PUBLIC_API_URL=http://localhost:3001/api
            - NEXT_PUBLIC_WS_URL=http://localhost:3001
            - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
            - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        restart: unless-stopped

    consumer:
        build:
            context: ../
            dockerfile: infra/Dockerfile.consumer
        ports:
            - "3002:3000"
        environment:
            - NODE_ENV=production
            - NEXT_PUBLIC_API_URL=http://localhost:3001/api
            - NEXT_PUBLIC_WS_URL=http://localhost:3001
            - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
            - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
            - NEXT_PUBLIC_MERCHANT_URL=http://localhost:3000
        restart: unless-stopped

    nginx:
        image: nginx:alpine
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - api
            - merchant
            - consumer
        restart: unless-stopped
